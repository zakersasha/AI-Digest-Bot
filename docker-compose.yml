services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: digest
      POSTGRES_PASSWORD: digest
      POSTGRES_DB: digest_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest -d digest_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["optional"]
    ports:
      - "6379:6379"

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://digest:digest@postgres:5432/digest_bot
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
