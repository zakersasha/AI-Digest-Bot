# Initial HTTP-only config — use before SSL certificate exists.
# Copy to: /etc/nginx/conf.d/brieflybot.pro.conf
# After certbot succeeds, replace with brieflybot.pro.conf

server {
    listen 80;
    listen [::]:80;
    server_name brieflybot.pro www.brieflybot.pro;

    root /var/www/brieflybot.pro;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location = /privacy-policy {
        default_type application/pdf;
        alias /var/www/brieflybot.pro/docs/briefly-privacy-policy.pdf;
    }

    location = /terms-of-service {
        default_type application/pdf;
        alias /var/www/brieflybot.pro/docs/briefly-terms-of-service.pdf;
    }

    location = /privacy {
        return 301 /privacy-policy;
    }

    location = /terms {
        return 301 /terms-of-service;
    }

    location /oauth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
