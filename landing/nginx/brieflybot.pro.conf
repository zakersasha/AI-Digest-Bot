# Production HTTPS config for brieflybot.pro
# Copy to: /etc/nginx/conf.d/brieflybot.pro.conf
# Requires: certbot certificates for brieflybot.pro (+ www)

server {
    listen 80;
    listen [::]:80;
    server_name brieflybot.pro www.brieflybot.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://brieflybot.pro$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.brieflybot.pro;

    ssl_certificate /etc/letsencrypt/live/brieflybot.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brieflybot.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://brieflybot.pro$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brieflybot.pro;

    ssl_certificate /etc/letsencrypt/live/brieflybot.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brieflybot.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/brieflybot.pro;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /privacy-policy {
        default_type application/pdf;
        alias /var/www/brieflybot.pro/docs/briefly-privacy-policy.pdf;
        add_header Content-Disposition 'inline; filename="briefly-privacy-policy.pdf"';
    }

    location = /terms-of-service {
        default_type application/pdf;
        alias /var/www/brieflybot.pro/docs/briefly-terms-of-service.pdf;
        add_header Content-Disposition 'inline; filename="briefly-terms-of-service.pdf"';
    }

    location = /privacy {
        return 301 /privacy-policy;
    }

    location = /terms {
        return 301 /terms-of-service;
    }

    # Gmail OAuth callback (bot listens on 127.0.0.1:8080)
    location /oauth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
