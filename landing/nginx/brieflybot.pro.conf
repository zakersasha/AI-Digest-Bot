# Production HTTPS — deploy to ~/cv_portfolio/nginx/conf.d/brieflybot.pro.conf
# Certs: ./certbot/conf/live/brieflybot.pro/ (mounted as /etc/letsencrypt)

server {
    listen 80;
    listen [::]:80;
    server_name brieflybot.pro www.brieflybot.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://brieflybot.pro$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.brieflybot.pro;

    ssl_certificate /etc/letsencrypt/live/brieflybot.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brieflybot.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:BrieflySSL:10m;
    ssl_session_timeout 1d;

    return 301 https://brieflybot.pro$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name brieflybot.pro;

    ssl_certificate /etc/letsencrypt/live/brieflybot.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brieflybot.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:BrieflySSL:10m;
    ssl_session_timeout 1d;

    root /var/www/brieflybot.pro;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /privacy-policy {
        default_type text/html;
        alias /var/www/brieflybot.pro/privacy-policy.html;
    }

    location = /terms-of-service {
        default_type text/html;
        alias /var/www/brieflybot.pro/terms-of-service.html;
    }

    location = /privacy {
        return 301 /privacy-policy;
    }

    location = /terms {
        return 301 /terms-of-service;
    }

    location /oauth/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
